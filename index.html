<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM GAME: Học Sinh Xây Tháp</title>
    <style>
        :root { --primary: #4361ee; --success: #2ec4b6; --bg: #f8f9fa; --text: #2b2d42; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        .card { background: white; padding: 2rem; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: var(--text); margin-bottom: 1.5rem; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .input-group { text-align: left; margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #4a4e69; font-size: 0.9rem; }
        input, select { width: 100%; padding: 14px; border: 2px solid #e9ecef; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1rem; margin-top: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-reg { background: var(--primary); }
        .btn-login { background: #3a0ca3; }
        .btn-build { background: var(--success); }
        .btn-build:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; opacity: 0.6; }
        .hidden { display: none; }
        .switch { margin-top: 20px; font-size: 0.9rem; color: #6c757d; }
        .switch a { color: var(--primary); text-decoration: none; font-weight: bold; }
        .score-preview { background: #f1f8ff; padding: 12px; border-radius: 12px; margin: 15px 0; color: var(--primary); border: 1px dashed var(--primary); }
        #status-info { color: #d00000; font-weight: bold; margin: 10px 0; font-size: 0.9rem; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <!-- KHỐI 1: ĐĂNG KÝ -->
    <div id="box-reg">
        <h2>📝 Tạo Lượt Xây</h2>
        <div class="input-group">
            <label>Tên nhân vật (Ví dụ: An_1):</label>
            <input type="text" id="reg-name" placeholder="Nhập tên em...">
        </div>
        <div class="input-group">
            <label>Mật khẩu (Khó = Tháp cao):</label>
            <input type="password" id="reg-pass" placeholder="Mật khẩu của em...">
        </div>
        <button class="btn-reg" onclick="handleReg()">1. Tạo mật khẩu</button>
        <div class="switch">Đã có lượt rồi? <a href="#" onclick="showBox('login')">Đăng nhập ngay</a></div>
    </div>

    <!-- KHỐI 2: ĐĂNG NHẬP -->
    <div id="box-login" class="hidden">
        <h2>🔐 Đăng Nhập</h2>
        <div class="input-group">
            <label>Tên đã đăng ký:</label>
            <input type="text" id="login-name">
        </div>
        <div class="input-group">
            <label>Mật khẩu:</label>
            <input type="password" id="login-pass">
        </div>
        <button class="btn-login" onclick="handleLogin()">2. Kiểm tra mật khẩu</button>
        <div class="switch"><a href="#" onclick="showBox('reg')">Quay lại Đăng ký</a></div>
    </div>

    <!-- KHỐI 3: CHỌN NHÓM & XÂY -->
    <div id="box-game" class="hidden">
        <h2>🏗 Xây Tháp</h2>
        <p>Thợ xây: <b id="user-display">---</b></p>
        <div class="score-preview">
            Số gạch của em: <b id="score-val" style="font-size: 1.5rem;">0</b> 🧱
        </div>
        
        <div class="input-group">
            <label>Chọn nhóm của em:</label>
            <select id="group-id">
                <option value="">Chờ danh sách từ GV...</option>
            </select>
        </div>

        <div id="status-info"></div>
        <button class="btn-build" id="build-btn" onclick="handleBuild()">3. ĐẶT GẠCH XÂY NHÀ 🚀</button>
        <p style="font-size: 0.8rem; color: #888; margin-top: 15px;">Xây xong hãy tạo thêm lượt để tháp cao hơn nữa!</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, get, child, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCep66eHM3yZWzPy5TPQvKrLy2ZkzH6OqU",
        authDomain: "cdsl3b13-19b3c.firebaseapp.com",
        databaseURL: "https://cdsl3b13-19b3c-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "cdsl3b13-19b3c",
        storageBucket: "cdsl3b13-19b3c.firebasestorage.app",
        messagingSenderId: "189558120626",
        appId: "1:189558120626:web:17b402865414c96ce2a9ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentUser = "";
    let currentScore = 0;
    let gameStatus = "ready";

    // --- LẮNG NGHE TÊN NHÓM VÀ TRẠNG THÁI TỪ GV ---
    onValue(ref(db, 'game_config'), (snap) => {
        const data = snap.val();
        const select = document.getElementById('group-id');
        const info = document.getElementById('status-info');
        const btn = document.getElementById('build-btn');

        if (data && data.groupNames) {
            gameStatus = data.status;
            
            // Vẽ lại danh sách nhóm (Lấy đúng tên thầy đã nhập)
            select.innerHTML = '';
            for (const [id, name] of Object.entries(data.groupNames)) {
                let opt = document.createElement('option');
                opt.value = id;
                opt.innerText = name;
                select.appendChild(opt);
            }

            // Quản lý nút bấm dựa trên trạng thái game
            if(gameStatus === 'playing') {
                info.innerText = "";
                btn.disabled = false;
            } else if (gameStatus === 'ended') {
                info.innerText = "TRÒ CHƠI ĐÃ KẾT THÚC!";
                btn.disabled = true;
            } else {
                info.innerText = "Chờ thầy/cô bấm BẮT ĐẦU nhé!";
                btn.disabled = true;
            }
        }
    });

    window.showBox = (mode) => {
        document.getElementById('box-reg').classList.toggle('hidden', mode !== 'reg');
        document.getElementById('box-login').classList.toggle('hidden', mode !== 'login');
        document.getElementById('box-game').classList.toggle('hidden', mode !== 'game');
    };

    function calculateScore(p) {
        if(!p) return 0;
        let s = p.length * 45;
        if (/[A-Z]/.test(p)) s += 150;
        if (/[0-9]/.test(p)) s += 150;
        if (/[^A-Za-z0-9]/.test(p)) s += 300;
        return Math.min(s, 1000);
    }

    window.handleReg = async () => {
        const name = document.getElementById('reg-name').value.trim();
        const pass = document.getElementById('reg-pass').value.trim();
        if(!name || !pass) return alert("Nhập đủ tên và mật khẩu nhé!");
        await set(ref(db, 'users/' + name), { password: pass });
        alert("Đã tạo xong! Giờ hãy Đăng nhập.");
        showBox('login');
        document.getElementById('login-name').value = name;
    };

    window.handleLogin = async () => {
        const name = document.getElementById('login-name').value.trim();
        const pass = document.getElementById('login-pass').value.trim();
        const snap = await get(child(ref(db), `users/${name}`));
        if (snap.exists() && snap.val().password === pass) {
            currentUser = name;
            currentScore = calculateScore(pass);
            document.getElementById('user-display').innerText = name;
            document.getElementById('score-val').innerText = currentScore;
            showBox('game');
        } else {
            alert("Tên hoặc mật khẩu chưa đúng!");
        }
    };

    window.handleBuild = async () => {
        const gid = document.getElementById('group-id').value;
        if(gameStatus !== 'playing') return alert("Chưa bắt đầu xây đâu!");
        
        await push(ref(db, 'game_scores/' + gid), currentScore);
        alert(`🎉 Đã thêm ${currentScore} điểm cho nhóm!`);
        
        // Reset để học sinh tạo mật khẩu mới
        document.getElementById('reg-name').value = "";
        document.getElementById('reg-pass').value = "";
        showBox('reg');
    };
</script>
</body>
</html>
